{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course</title>
    <link rel="stylesheet" href="{% static 'main/styles.css' %}">
    <link rel="icon" href="{% static 'main/favicon.ico' %}" type="image/x-icon">
</head>
<body>
    {% for course in courses %}
        <h1>Course</h1>
        <h3>Name: {{ course.name }}</h3>
        <h4>Level: {{ course.level }}</h4>
        <h4>Time: {{ course.time }}</h4>
        <h4>---------------------------------------------</h4>
    {% endfor %}
</body>
</html>

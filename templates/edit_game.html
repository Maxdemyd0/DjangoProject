<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background-color: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 95%;
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
            background-color: #2a2a2a;
            color: white;
            font-size: 14px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border: 2px solid #4CAF50;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #3a8b3f;
        }

        button:active {
            transform: scale(0.97);
        }

        .category-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-color: #2a2a2a;
            padding: 12px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        input,
        textarea,
        button {
            font-family: Arial, sans-serif;
        }

        input[type="checkbox"] {
            accent-color: red;
        }

        select {
            background-color: #2a2a2a;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 35px;
            }

            input,
            textarea {
                font-size: 16px;
            }

            button {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <h1>{{ game.title }}</h1>
    <div class="form-container">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <label for="title">Title</label>
            <input type="text" name="title" id="title" value="{{ game.title }}">

            <label for="description">Description</label>
            <textarea name="description" id="description">{{ game.description }}</textarea>

            <label for="categories">Categories</label>
            {% for category in categories %}
                <label>
                    <input type="checkbox"
                           name="categories"
                           id="categories"
                           value="{{ category.id }}"
                           {% if category in game.categories.all %}checked{% endif %}>
                    {{ category.name }}
                </label>
            {% endfor %}

            <label for="developer">Developer</label>
            <input type="text" name="developer" id="developer" value="{{ game.developer }}">

            <label for="publisher">Publisher</label>
            <input type="text" name="publisher" id="publisher" value="{{ game.publisher }}">

            <label for="price">Price ($)</label>
            <input type="number" step="0.01" name="price" id="price" value="{{ game.price }}">

            <label for="icon_url">Icon URL</label>
            <input type="text" name="icon_url" id="icon_url" value="{{ game.icon_url }}">

            <label for="gameplay_video">Gameplay Video (optional)</label>
            <input type="file" name="gameplay_video" id="gameplay_video">

            <button type="submit">Save Changes</button>
        </form>
    </div>
</body>
</html>

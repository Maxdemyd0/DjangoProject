{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Category</title>
    <link rel="icon" href="{% static 'favicon.ico' %}">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
        }

        input,
        textarea {
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
            background-color: #2a2a2a;
            color: white;
            font-size: 14px;
        }

        input:focus,
        textarea:focus {
            border: 2px solid #4CAF50;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #3a8b3f;
        }

        button:active {
            transform: scale(0.97);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-align: center;
            color: #4CAF50;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        input,
        textarea,
        button {
            font-family: Arial, sans-serif;
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 35px;
            }

            input,
            textarea {
                font-size: 16px;
            }

            button {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h1>Create Category</h1>

        <form method="POST" action="{% url 'add-category' %}">
            {% csrf_token %}

            <label for="name">Category Name</label>
            <input type="text" name="name" id="name" required>

            <label for="description">Description</label>
            <textarea name="description" id="description"></textarea>

            <button type="submit">Create Category</button>
        </form>

        <a href="{% url 'games' %}" class="back-link">
            ← Back to Games
        </a>
    </div>

</body>
</html>
